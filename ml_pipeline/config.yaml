# ── Models ─────────────────────────────────────────────────────────────────────
# Switch between PyTorch (.pt) and OpenVINO (folder) by changing the path.
# OpenVINO folders give faster CPU inference — use them in production.

# PyTorch (original):
# person_model: models/yolov8n.pt
# ppe_model:    ml_pipeline/models/ppe_yolov8m_best.pt

# OpenVINO:
person_model:   ml_pipeline/models/person_model_openvino
ppe_model:      ml_pipeline/models/ppe_detection_openvino

# ── Data / Labels ──────────────────────────────────────────────────────────────
data_yaml:      ml_pipeline/data.yaml

# ── Confidence Thresholds ──────────────────────────────────────────────────────
person_conf:    0.5
ppe_conf:       0.5
alert_conf:     0.6

# ── Temporal Smoothing & Cooldown ──────────────────────────────────────────────
temporal_frames:  5
cooldown_seconds: 15
auto_detect_site: true

# ── Backend API ────────────────────────────────────────────────────────────────
api_base_url:   https://Tehreem786Irfan-ppe-backend-api.hf.space
api_email:      admin@ppe.com
api_password:   admin123

# ── Camera / Site Info ─────────────────────────────────────────────────────────
site_name:      "Construction Site"
camera_name:    "Camera 1"

# ── Video Sources ──────────────────────────────────────────────────────────────
# For the CLI pipeline (ml_pipeline/main.py).
# The Streamlit Live Monitor page manages its own source via the UI.
#   0        → default webcam
#   1, 2 ... → other USB cameras
#   "path/to/file.mp4" → video file
video_source:   "ml_pipeline/test_videos/demo.mp4"

# ── Output ─────────────────────────────────────────────────────────────────────
saved_violations_dir: ./saved_violations
show_display:   true
skip_frames:    4